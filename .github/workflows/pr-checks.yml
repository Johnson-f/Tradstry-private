name: PR Quality Checks

on:
  pull_request:
    branches: [ main, master ]
    types: [ opened, synchronize, reopened ]
  push:
    branches: [ main, master ]

jobs:
  frontend-checks:
    name: Frontend Quality Checks
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      
      - name: Install dependencies
        run: bun install --frozen-lockfile
      
      - name: TypeScript Type Check
        run: |
          echo "🔍 Running TypeScript type check..."
          bun run type-check
        continue-on-error: false
      
      - name: Build Check
        run: |
          echo "🔨 Running build check..."
          bun run build
        continue-on-error: false

  backend-checks:
    name: Backend Quality Checks
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Setup UV
        uses: astral-sh/setup-uv@v4
        with:
          version: latest

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy
          override: true
      
      - name: Cache Rust dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            backend/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-
      
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config
      
      - name: Rust Type Check
        run: |
          echo "Running Rust type check..."
          cd backend
          cargo check --all-targets
        continue-on-error: false
      
      - name: Rust Clippy Check
        run: |
          echo "🔍 Running Rust clippy check..."
          cd backend
          cargo clippy --all-targets --all-features -- -D warnings
        continue-on-error: false
      
      - name: Rust Build Check
        run: |
          echo "Running Rust build check..."
          cd backend
          cargo build --release
        continue-on-error: false

      - name: Install Agents Service Python dependencies
        working-directory: backend/agents_service
        run: uv sync --group dev

      - name: Agents Service Baseline MyPy check
        working-directory: backend/agents_service
        run: uv run mypy --config-file pyproject.toml src

      - name: Agents Service Strict MyPy check
        working-directory: backend/agents_service
        run: uv run mypy --config-file mypy-strict.ini src

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest
      
      - name: Install dependencies
        run: bun install --frozen-lockfile
      
      - name: Run Security Audit
        run: |
          echo "Running security audit..."
          bun audit --audit-level moderate || echo "Note: Bun audit may have different output format"
        continue-on-error: true

  pr-summary:
    name: PR Summary
    runs-on: ubuntu-latest
    needs: [frontend-checks, backend-checks, security-audit]
    if: always()
    
    steps:
      - name: Generate PR Summary
        run: |
          echo "## PR Quality Check Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend Checks | ${{ needs.frontend-checks.result == 'success' && 'Passed' || 'Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Backend Checks | ${{ needs.backend-checks.result == 'success' && 'Passed' || 'Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Security Audit | ${{ needs.security-audit.result == 'success' && 'Passed' || 'Warnings' || 'Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [[ "${{ needs.frontend-checks.result }}" != "success" || "${{ needs.backend-checks.result }}" != "success" ]]; then
            echo "**This PR has failed quality checks and should not be merged.**" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "Please fix the issues above before requesting review." >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "**All quality checks passed! This PR is ready for review.**" >> $GITHUB_STEP_SUMMARY
          fi
